project:
  type: book
  output-dir: _book

lang: pt-BR

book:
  title: "Física com Python"
  subtitle: "Aprendendo Física por meio de modelos e simulações"
  author: "Sidney Cerqueira"
  date: today
  chapters:
    - index.qmd
    - prefacio.qmd
    - part: "Parte I — Ferramentas para investigar a Física"
      chapters:
        - capitulos/01-introducao.qmd
        - capitulos/02-medidas-incertezas.qmd
        - capitulos/03-vetores.qmd
    - part: "Parte II — Mecânica"
      chapters:
        - capitulos/04-movimento.qmd
    - part: "Atividades"
      chapters:
        - exercicios/01-exercicios.qmd
    - referencias.qmd

bibliography: referencias.bib

format:
  html:
    theme: cosmo
    toc: true
    code-copy: true
    code-fold: false
  pdf:
    documentclass: scrreprt

execute:
  freeze: auto
  warning: false
  error: true
